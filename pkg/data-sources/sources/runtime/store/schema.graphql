extend type Function {
  "Get value by key. Returns null if key does not exist."
  get(
    "Name of the store data source"
    store: String!
    "Key to retrieve"
    key: String!
  ): String
    @function(name: "core_store_get")

  "List keys matching a glob pattern (e.g. user:*, ratelimit:*)"
  keys(
    "Name of the store data source"
    store: String!
    "Glob pattern"
    pattern: String!
  ): [String]
    @function(name: "core_store_keys")
}

extend type MutationFunction {
  "Set key-value pair with optional TTL"
  set(
    "Name of the store data source"
    store: String!
    "Key"
    key: String!
    "Value"
    value: String!
    "Time-to-live in seconds. 0 or null = no expiry"
    ttl: Int
  ): OperationResult
    @function(name: "core_store_set")

  "Delete a key"
  del(
    "Name of the store data source"
    store: String!
    "Key to delete"
    key: String!
  ): OperationResult
    @function(name: "core_store_del")

  "Atomically increment integer value. Creates key with value 1 if not exists."
  incr(
    "Name of the store data source"
    store: String!
    "Key to increment"
    key: String!
  ): BigInt
    @function(name: "core_store_incr")

  "Set TTL on an existing key"
  expire(
    "Name of the store data source"
    store: String!
    "Key"
    key: String!
    "TTL in seconds"
    ttl: Int!
  ): OperationResult
    @function(name: "core_store_expire")

  "Publish a message to a Pub/Sub channel"
  publish(
    "Name of the store data source"
    store: String!
    "Channel name"
    channel: String!
    "Message payload"
    message: String!
  ): OperationResult
    @function(name: "core_store_publish")

  "Configure Redis keyspace notification events (default KEA = all events)"
  configure_keyspace_events(
    "Name of the store data source"
    store: String!
    "Event types string (e.g. KEA, Kg, Ex). Default KEA"
    events: String = "KEA"
  ): OperationResult
    @function(name: "core_store_configure_keyspace_events")
}

extend type Subscription {
  "Subscribe to messages on a Pub/Sub channel"
  subscribe(
    "Name of the store data source"
    store: String!
    "Channel name"
    channel: String!
  ): store_message

  "Watch for keyspace events matching a glob pattern"
  watch(
    "Name of the store data source"
    store: String!
    "Keyspace pattern (e.g. __keyevent@0__:*)"
    pattern: String!
  ): store_key_event
}

type store_message {
  channel: String
  message: String
}

type store_key_event {
  key: String
  event: String
}
