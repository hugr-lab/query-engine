# core.catalog Schema Views
# Mounted as module core.catalog — types accessed as core.catalog.catalogs, core.catalog.types, etc.
# Conditional: @embeddings directives included only when EmbeddingsEnabled=true

# --- Catalogs (data sources) ---

"Schema catalogs (data sources)"
type schema_catalogs @view(name: "_schema_catalogs", sql: """
  SELECT 
    c.name, c.version, c.description, c.long_description, 
    COALESCE(NULLIF(c.source_type, ''), ds.type) AS source_type, 
    COALESCE(NULLIF(c.prefix, ''), COALESCE(ds.prefix, '')) AS prefix,
    COALESCE(c.as_module, COALESCE(ds.as_module, false)) AS as_module,
    COALESCE(c.read_only, COALESCE(ds.read_only, false)) AS read_only,
    COALESCE(c.disabled, false) AS disabled,
    COALESCE(c.suspended, false) AS suspended,
    COALESCE(c.is_summarized, false) AS is_summarized,
    c.vec
  FROM [_schema_catalogs] c
    LEFT JOIN [data_sources] ds ON c.name = ds.name
""")
  @module(name: "catalog")
  {{ if .EmbeddingsEnabled }}@embeddings(model: "_system_embedder", vector: "vec", distance: Cosine){{ end }} {
  name: String! @pk
  version: String
  description: String
  long_description: String
  type: String
  prefix: String
  as_module: Boolean
  read_only: Boolean
  disabled: Boolean
  suspended: Boolean
  is_summarized: Boolean
  {{ if .EmbeddingsEnabled }}vec: Vector @dim(len: {{ .VectorSize }}) {{ end }}
}

# --- Catalog Dependencies ---

"Catalog dependency tracking"
type schema_catalog_dependencies
  @view(name: "_schema_catalog_dependencies")
  @module(name: "catalog")
  @references(
    name: "catalog_dep_catalog"
    source_fields: ["catalog"]
    references_fields: ["name"]
    references_name: "schema_catalogs"
    query: "catalog_info"
    description: "The dependent catalog"
    references_query: "dependencies"
    references_description: "Catalogs this catalog depends on"
  )
  @references(
    name: "catalog_dep_depends_on"
    source_fields: ["depends_on"]
    references_fields: ["name"]
    references_name: "schema_catalogs"
    query: "depends_on_info"
    description: "The dependency catalog"
    references_query: "dependents"
    references_description: "Catalogs that depend on this catalog"
  ) {
  catalog: String! @pk @field_source(field: "catalog_name")
  depends_on: String! @pk
}

# --- Types ---

"Schema type definitions"
type types
  @view(name: "_schema_types")
  @module(name: "catalog")
  {{ if .EmbeddingsEnabled }}@embeddings(model: "_system_embedder", vector: "vec", distance: Cosine){{ end }} {
  name: String! @pk
  kind: String!
  description: String!
  long_description: String!
  hugr_type: String!
  module: String! @field_references(
    name: "types_module_ref"
    field: "name"
    references_name: "modules"
    query: "module_info"
    description: "Module this type belongs to"
    references_query: "types_in_module"
    references_description: "Types in this module"
  )
  catalog: String @field_references(
    name: "types_catalog_ref"
    field: "name"
    references_name: "schema_catalogs"
    query: "catalog_info"
    description: "Catalog this type belongs to"
    references_query: "types_in_catalog"
    references_description: "Types in this catalog"
  )
  is_summarized: Boolean!
  {{ if .EmbeddingsEnabled }}vec: Vector @dim(len: {{ .VectorSize }}){{ end }}
}

# --- Fields ---

"Schema field definitions"
type fields @view(name: "_schema_fields")
  @module(name: "catalog")
