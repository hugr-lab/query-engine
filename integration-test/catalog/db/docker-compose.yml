services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: dbprovider_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports: ["5435:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d dbprovider_test"]
      interval: 2s
      timeout: 5s
      retries: 15
