services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: coredb_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports: ["5434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d coredb_test"]
      interval: 2s
      timeout: 5s
      retries: 15
