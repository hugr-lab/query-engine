type events @table(name: "events") {
    id: BigInt! @pk @default(sequence: "events_id_seq")
    name: String!
    value: Float!
    is_active: Boolean! @default(value: "true")
    payload: JSON
    created_at: Timestamp @default(value: "now()")
    geom: Geometry @geometry_info(srid: 4326, type: POINT)
    geom_wkt: Geometry @geometry_info(srid: 4326, type: LINESTRING)
    geom_geojson: Geometry @geometry_info(srid: 4326, type: POLYGON)
    geom_wkb: Geometry @geometry_info(srid: 4326, type: POINT)
}
