type Airport @table(name: "airports") {
  iata_code: String! @pk
  name: String!
  city: String!
  geom: Geometry
}

extend type Function {
  search_airports(query: String!, limit: Int): Airport
    @function(name: "search_airports")
  find_nearby(iata_code: String!, radius: Float): [Airport]
    @function(name: "find_nearby_airports")
}

extend type Airport {
  nearby: [Airport] @table_function_call_join(references_name: "find_nearby", args: {iata_code: "iata_code"})
}
