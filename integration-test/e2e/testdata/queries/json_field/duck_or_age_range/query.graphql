{
  local_db {
    json_field_demo(
      filter: {
        _or: [
          { data: { field: { path: "user.age", int: { eq: 35 } } } }
          { data: { field: { path: "user.age", int: { gte: 18, lte: 25 } } } }
        ]
      }
      order_by: [{ field: "id", direction: ASC }]
    ) {
      id
    }
  }
}
