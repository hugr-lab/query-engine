{
  pg_store {
    json_field_demo(
      filter: {
        _or: [
          { data: { field: { path: "event.local_dt", dateTime: { eq: "2024-06-11T10:00:00" } } } }
          { data: { field: { path: "event.local_dt", dateTime: { gte: "2024-06-12T09:00:00", lte: "2024-06-12T11:00:00" } } } }
        ]
      }
      order_by: [{ field: "id", direction: ASC }]
    ) {
      id
    }
  }
}
