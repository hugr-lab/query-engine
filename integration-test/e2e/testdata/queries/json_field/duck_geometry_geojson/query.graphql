{
  local_db {
    json_field_demo(
      filter: {
        data: {
          field: {
            path: "shape"
            geometry: {
              intersects: {
                type: "Polygon"
                coordinates: [[[5,47],[15,47],[15,55],[5,55],[5,47]]]
              }
            }
          }
        }
      }
      order_by: [{ field: "id", direction: ASC }]
    ) {
      id
    }
  }
}
