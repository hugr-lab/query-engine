{
  pg_store {
    json_field_demo(
      filter: {
        _or: [
          { data: { field: { path: "signup.day", date: { eq: "2024-01-15" } } } }
          { data: { field: { path: "signup.day", date: { gte: "2024-02-01", lte: "2024-02-28" } } } }
        ]
      }
      order_by: [{ field: "id", direction: ASC }]
    ) {
      id
    }
  }
}
