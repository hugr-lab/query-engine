type events @table(name: "events") {
    id: BigInt! @pk
    name: String
    value: Float
    event_date: Date
    event_time: Time
    duration: Interval
    metadata: JSON
    created_at: Timestamp
}

type event_tags @table(name: "event_tags") {
    event_id: BigInt! @pk @field_references(
        field: "id"
        references_name: "events"
        query: "event"
        references_query: "tags"
    )
    tag: String! @pk
}

extend type Function {
    generate_series(start: Int!, stop: Int!, step: Int): Int
        @function(name: "generate_series")
}
