type events @table(name: "events") {
    id: BigInt! @pk
    name: String
    value: Float
    event_date: Date
    event_time: Time
    duration: Interval
    metadata: JSON
    created_at: Timestamp
}

type event_tags @table(name: "event_tags") {
    event_id: BigInt! @pk @field_references(
        field: "id"
        references_name: "events"
        query: "event"
        references_query: "tags"
    )
    tag: String! @pk
}

type ItemSpecs {
    cpu: String
    ram_gb: Int
    storage_gb: Int
}

type items @table(name: "items") {
    id: BigInt! @pk
    name: String
    specs: ItemSpecs
    tags: JSON
    created_at: Timestamp
}

"""
Demo dataset for JSONFieldFilter coverage: filter rows by extracting and casting nested values inside `data` (e.g. data.user.age, data.user.country, data.metrics.score, data.shape, data.event.at).
"""
type json_field_demo @table(name: "json_field_demo") {
    id: BigInt! @pk
    data: JSON
}

extend type Function {
    generate_series(start: Int!, stop: Int!, step: Int = 1): [Int]
        @function(name: "generate_series")
}
