# Extension source: bridges local_db and pg_store via @references, @join, @function_call.

# @references: items (1-3) ↔ events (1-3), matched by id.
extend type local_db_items
  @dependency(name: "local_db")
  @references(
    name: "item_event"
    references_name: "local_db_events"
    source_fields: ["id"]
    references_fields: ["id"]
    query: "event"
    references_query: "item"
  ) {
  _stub: String
}

# @join: products (1-5) → items (1-3), cross-source join matched by id.
extend type pg_store_products
  @dependency(name: "pg_store")
  @dependency(name: "local_db") {
  matching_items: [local_db_items] @join(
    references_name: "local_db_items"
    source_fields: ["id"]
    references_fields: ["id"]
  )
}

# @function_call: call HTTP test_get function with item fields (all args mapped).
extend type local_db_items
  @dependency(name: "local_db")
  @dependency(name: "rest_api") {
  test_info: rest_api_test_result @function_call(
    references_name: "test_get"
    args: { name: "name", value: "id" }
    module: "rest_api.test"
  )
}

# @function_call: partial arg mapping — value mapped to table field, name is a query argument.
extend type local_db_items
  @dependency(name: "local_db")
  @dependency(name: "rest_api") {
  test_info_partial(name: String!): rest_api_test_result @function_call(
    references_name: "test_get"
    args: { value: "id" }
    module: "rest_api.test"
  )
}

# @join: items → parameterized view (products_in_price_range), cross-source with view args.
extend type local_db_items
  @dependency(name: "local_db")
  @dependency(name: "pg_store") {
  products_in_range: [pg_store_products_in_price_range] @join(
    references_name: "pg_store_products_in_price_range"
    source_fields: ["id"]
    references_fields: ["id"]
  )
}

# @join: items → regular view (active_products), cross-source with no view args.
extend type local_db_items
  @dependency(name: "local_db")
  @dependency(name: "pg_store") {
  active_products: [pg_store_active_products] @join(
    references_name: "pg_store_active_products"
    source_fields: ["id"]
    references_fields: ["id"]
  )
}
