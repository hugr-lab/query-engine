services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports: ["5433:5432"]
    volumes:
      - ./testdata/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 15

  http-service:
    build:
      context: ../../
      dockerfile: internal/http_test_service/Dockerfile
    ports: ["17000:17000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:17000/test_get?name=health&val=1 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10

  query-engine:
    build:
      context: ../../
      dockerfile: integration-test/e2e/Dockerfile
    ports: ["15000:15000"]
    environment:
      BIND: ":15000"
      DB_PATH: ""
      DB_ALLOWED_DIRECTORIES: "/workspace"
      CORE_DB_PATH: ""
      ADMIN_UI: "false"
      ALLOWED_ANONYMOUS: "true"
      ANONYMOUS_ROLE: "admin"
    depends_on:
      postgres:
        condition: service_healthy
      http-service:
        condition: service_healthy
    volumes:
      - ./testdata:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:15000/query?query={__typename} || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20
