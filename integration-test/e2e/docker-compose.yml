services:
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports: ["9000:9000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/warehouse --ignore-existing;
      exit 0;
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    ports: ["8181:8181"]
    environment:
      CATALOG_WAREHOUSE: "s3://warehouse/"
      CATALOG_IO__IMPL: "org.apache.iceberg.aws.s3.S3FileIO"
      CATALOG_S3_ENDPOINT: "http://minio:9000"
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      AWS_REGION: "us-east-1"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 3s
      timeout: 5s
      retries: 15

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports: ["5433:5432"]
    volumes:
      - ./testdata/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./testdata/postgres/init-ducklake-meta.sh:/docker-entrypoint-initdb.d/02-ducklake-meta.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 15

  http-service:
    build:
      context: ../../
      dockerfile: internal/http_test_service/Dockerfile
    ports: ["17000:17000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:17000/test_get?name=health&val=1 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10

  query-engine:
    build:
      context: ../../
      dockerfile: integration-test/e2e/Dockerfile
    ports: ["15000:15000"]
    environment:
      BIND: ":15000"
      DB_PATH: ""
      DB_ALLOWED_DIRECTORIES: "/workspace"
      CORE_DB_PATH: ""
      ADMIN_UI: "false"
      ALLOWED_ANONYMOUS: "true"
      ANONYMOUS_ROLE: "admin"
    depends_on:
      postgres:
        condition: service_healthy
      http-service:
        condition: service_healthy
    volumes:
      - ./testdata:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:15000/query?query={__typename} || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40

  core-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: coredb_e2e
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports: ["5436:5432"]
    volumes:
      - ./testdata/core-postgres/init.sh:/docker-entrypoint-initdb.d/init-extra-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d coredb_e2e"]
      interval: 2s
      timeout: 5s
      retries: 15

  query-engine-pg:
    build:
      context: ../../
      dockerfile: integration-test/e2e/Dockerfile
    ports: ["15001:15001"]
    environment:
      BIND: ":15001"
      DB_PATH: ""
      DB_ALLOWED_DIRECTORIES: "/workspace"
      CORE_DB_PATH: "postgres://test:test@core-postgres:5432/coredb_e2e"
      ADMIN_UI: "false"
      ALLOWED_ANONYMOUS: "true"
      ANONYMOUS_ROLE: "admin"
    depends_on:
      core-postgres:
        condition: service_healthy
      postgres:
        condition: service_healthy
      http-service:
        condition: service_healthy
    volumes:
      - ./testdata:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:15001/query?query={__typename} || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40

  cluster-mgmt:
    build:
      context: ../../
      dockerfile: integration-test/e2e/Dockerfile
    ports: ["15010:15010"]
    environment:
      BIND: ":15010"
      DB_PATH: ""
      DB_ALLOWED_DIRECTORIES: "/workspace"
      CORE_DB_PATH: "postgres://test:test@core-postgres:5432/coredb_cluster"
      ADMIN_UI: "false"
      ALLOWED_ANONYMOUS: "true"
      ANONYMOUS_ROLE: "admin"
      CLUSTER_ENABLED: "true"
      CLUSTER_ROLE: "management"
      CLUSTER_NODE_NAME: "mgmt"
      CLUSTER_NODE_URL: "http://cluster-mgmt:15010/ipc"
      CLUSTER_SECRET: "e2e-cluster-secret"
      CLUSTER_HEARTBEAT: "5s"
      CLUSTER_GHOST_TTL: "60s"
      CLUSTER_POLL_INTERVAL: "5s"
    depends_on:
      core-postgres:
        condition: service_healthy
      postgres:
        condition: service_healthy
      http-service:
        condition: service_healthy
    volumes:
      - ./testdata:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:15010/query?query={__typename} || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40

  cluster-worker-1:
    build:
      context: ../../
      dockerfile: integration-test/e2e/Dockerfile
    ports: ["15011:15011"]
    environment:
      BIND: ":15011"
      DB_PATH: ""
      DB_ALLOWED_DIRECTORIES: "/workspace"
      CORE_DB_PATH: "postgres://test:test@core-postgres:5432/coredb_cluster"
      ADMIN_UI: "false"
      ALLOWED_ANONYMOUS: "true"
      ANONYMOUS_ROLE: "admin"
      CLUSTER_ENABLED: "true"
      CLUSTER_ROLE: "worker"
      CLUSTER_NODE_NAME: "worker-1"
      CLUSTER_NODE_URL: "http://cluster-worker-1:15011/ipc"
      CLUSTER_SECRET: "e2e-cluster-secret"
      CLUSTER_HEARTBEAT: "5s"
      CLUSTER_GHOST_TTL: "60s"
      CLUSTER_POLL_INTERVAL: "5s"
    depends_on:
      core-postgres:
        condition: service_healthy
      postgres:
        condition: service_healthy
      http-service:
        condition: service_healthy
      cluster-mgmt:
        condition: service_healthy
    volumes:
      - ./testdata:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:15011/query?query={__typename} || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40

  cluster-worker-2:
    build:
      context: ../../
      dockerfile: integration-test/e2e/Dockerfile
    ports: ["15012:15012"]
    environment:
      BIND: ":15012"
      DB_PATH: ""
      DB_ALLOWED_DIRECTORIES: "/workspace"
      CORE_DB_PATH: "postgres://test:test@core-postgres:5432/coredb_cluster"
      ADMIN_UI: "false"
      ALLOWED_ANONYMOUS: "true"
      ANONYMOUS_ROLE: "admin"
      CLUSTER_ENABLED: "true"
      CLUSTER_ROLE: "worker"
      CLUSTER_NODE_NAME: "worker-2"
      CLUSTER_NODE_URL: "http://cluster-worker-2:15012/ipc"
      CLUSTER_SECRET: "e2e-cluster-secret"
      CLUSTER_HEARTBEAT: "5s"
      CLUSTER_GHOST_TTL: "60s"
      CLUSTER_POLL_INTERVAL: "5s"
    depends_on:
      core-postgres:
        condition: service_healthy
      postgres:
        condition: service_healthy
      http-service:
        condition: service_healthy
      cluster-mgmt:
        condition: service_healthy
    volumes:
      - ./testdata:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:15012/query?query={__typename} || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
