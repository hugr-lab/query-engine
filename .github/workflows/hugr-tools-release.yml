name: hugr-tools Release

on:
  push:
    tags:
      - 'hugr-tools-v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CGO_CFLAGS: "-O1 -g"
  BUILD_TAGS: "duckdb_arrow"

jobs:
  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: |
          go build -tags "$BUILD_TAGS" -o hugr-tools-darwin-arm64 ./cmd/hugr-tools
      - uses: actions/upload-artifact@v4
        with:
          name: hugr-tools-darwin-arm64
          path: hugr-tools-darwin-arm64

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: |
          go build -tags "$BUILD_TAGS" -o hugr-tools-linux-amd64 ./cmd/hugr-tools
      - uses: actions/upload-artifact@v4
        with:
          name: hugr-tools-linux-amd64
          path: hugr-tools-linux-amd64

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build via Docker
        run: |
          docker buildx build --platform linux/arm64 -f Dockerfile.hugr-tools --output type=local,dest=. .
          mv hugr-tools hugr-tools-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: hugr-tools-linux-arm64
          path: hugr-tools-linux-arm64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: |
          go build -tags "$env:BUILD_TAGS" -o hugr-tools-windows-amd64.exe ./cmd/hugr-tools
      - uses: actions/upload-artifact@v4
        with:
          name: hugr-tools-windows-amd64
          path: hugr-tools-windows-amd64.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-darwin, build-linux-amd64, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/hugr-tools-darwin-arm64/hugr-tools-darwin-arm64 release/
          cp artifacts/hugr-tools-linux-amd64/hugr-tools-linux-amd64 release/
          cp artifacts/hugr-tools-linux-arm64/hugr-tools-linux-arm64 release/
          cp artifacts/hugr-tools-windows-amd64/hugr-tools-windows-amd64.exe release/
          cd release && for f in hugr-tools-*; do sha256sum "$f" >> checksums.txt; done
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
